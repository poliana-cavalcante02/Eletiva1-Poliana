<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tela 2 bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container py-4">
        <h1>Formulário 2</h1>
        <form class="row g-3">
            <div class="col-md-1">
                <label class="form_label">Código</label>
                <div class="input-group">
                    <span class="input-group-text">32</span>
                </div>
            </div>
            
            <div class="col-md-4">
                <label class="form-label"> <strong>Nome</strong></label>
                <input type="text" class="form-control" placeholder="Nome completo do cliente">
            </div>

            <div class="col-md-4">
                <label class="form-label"> <strong>E-mail</strong></label>
                <input type="text" class="form-control" placeholder="cliente@email.com">
            </div>

            <div class="col-md-3">
                <label class="form-label"> <strong>CPF </strong></label>
                <input type="number" class="form-control" placeholder="Só numeros">
            </div>
            
            <div class="col-md-2">
                <label class="form-label"><strong>N° do celular </strong></label>
                <input type="number" class="form-control" placeholder="N° do celular">
            </div>

            <div class="col-md-2">
                <label class="form-label"><strong>N° telefone fixo </strong></label>
                <input type="number" class="form-control" placeholder="N° telefone fixo">
            </div>

            <div class="col-md-2">
                <label class="form-label"> <strong>CEP</strong></label>
                <input type="number" class="form-control" placeholder="ex:00.000-000">
            </div>

            <div class="col-md-2">
                <label class="form-label"><strong>Logradouro </strong></label>
                <input type="text" class="form-control" placeholder="Rua 1400">
            </div>

            <div class="col-md-1">
                <label class="form-label"><strong>N° </strong></label>
                <input type="number" class="form-control" placeholder="Nº">
            </div>

            <div class="col-md-3">
                <label class="form-label"> <strong>Bairro</strong></label>
                <input type="text" class="form-control" placeholder="Bairro">
            </div>

            <div class="col-md-3">
                <label class="form-label"> <strong>Cidade </strong></label>
                <input type="text" class="form-control" placeholder="Cidade">
            </div>

            <div class="col-md-1">
                <label class="form-label"><strong>UF </strong></label>
                <input type="text" class="form-control" placeholder="UF">
            </div>

            <div class="col-md-2">
                <label class="form-label"><strong>Selecione </strong></label>
                <select class="form-select">
                <option>Selecione</option>
                </select>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button class="btn btn-primary me-md-2 btn-danger" type="button">Resetar</button>
                <button class="btn btn-primary btn-success" type="button">Próximo</button>
            </div>
        </form>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

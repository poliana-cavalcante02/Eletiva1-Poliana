<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telas bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
      <div class="container py-4">
        <h1>Novo Usuário</h1>
        <form class="row g-3">
          <div class="row g-3 align-items-center">
            <label class=" form-label fw-bold">Nome:</label>
            <input type="text" class="form-control" placeholder="Inform o nome>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">CFP:</label>
            <input type="text" class="form-control" placeholder="Informe o CPF">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Endereço</label>
            <input type="text" class="form-control" placeholder="Informe o Endereço">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-bold">Nível:</label>
            <select class="form-select">
              <option selected>---</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Email </label>
            <input type="text" class="form-control" placeholder="Informe o email">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Senha</label>
            <input type="password" class="form-control" placeholder="Informe a Senha">
          </div>
          <div class="col-md-2">
            <label class="form-label fw-bold">Status</label>
            <select class="form-select">
              <option selected>---</option>
            </select>
          </div>
          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <button class="btn btn-success me-md-2" type="button">Enviar</button>
            <button class="btn btn-light btn-outline-secondary" type="button">Cancelar</button>
          </div>
        </form>
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
